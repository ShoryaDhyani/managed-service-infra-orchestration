name: Build and Push Builder Image

on:
  push:
    branches:
      - master
    paths:
      - "buildServer/**"

env:
  AWS_REGION: ap-south-1

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push image
        working-directory: ./buildServer
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_BUILDER }}
          docker build -t $IMAGE:${{ steps.vars.outputs.sha_short }} -t $IMAGE:latest .
          docker push $IMAGE:${{ steps.vars.outputs.sha_short }}
          docker push $IMAGE:latest

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition builder-task \
            --query taskDefinition > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: builder-image
          image: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_BUILDER }}:${{ steps.vars.outputs.sha_short }}

      - name: Register new task definition revision
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}