name: Deploy to Amazon ECS

on:
  push:
    branches: ["master"]
    paths:
      - "frontend/**"
      - "apiserver/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: webapp-msio
  ECS_SERVICE: msio-td-service-pi8c33zb
  ECS_CLUSTER: msio-deploy
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: webapp

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    # 1. Checkout
    - name: Checkout source
      uses: actions/checkout@v4

    # 2. Setup Node (for frontend build)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    # 3. Build frontend
    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    # 4. Copy frontend build into backend
    - name: Copy frontend to backend
      run: |
        mkdir -p apiserver/static
        cp -r frontend/dist/* apiserver/static/

    # 5. Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 6. Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 7. Build and push Docker image
    - name: Build, tag, and push image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd apiserver
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 8. Render new ECS task definition
    - name: Update task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    # 9. Deploy to ECS
    - name: Deploy to ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
